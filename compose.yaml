services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subscriptiondb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  seq:
    container_name: seq
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80"
      - "5341:5341"
    restart: always

  subscription-service:
    build:
      context: .
      dockerfile: src/SubscriptionService.Web/Dockerfile
    container_name: subscription-service
    restart: always
    ports:
      - "${APP_PORT:-5001}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-subscriptiondb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change_me}"
      Serilog__WriteTo__1__Args__serverUrl: "${SEQ_SERVER_URL:-http://seq:80}"
    depends_on:
      - postgres
      - seq

volumes:
  postgres-data:
    name: subscriptionservice-postgres-data
